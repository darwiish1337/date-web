<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Will You?</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>

  <main class="container" id="main">

    <div class="card" id="card">
      <div class="card-inner">

        <div class="top-label">a little question for you</div>

        <div class="cat-wrapper">
          <div class="cat-ring"></div>
          <img
            class="cat-img"
            src="assets/cat-wink.gif"
            alt="cute cat"
            id="catImg"
          />
        </div>

        <h1 class="headline">Will you go on<br /><em>a date with me?</em></h1>

        <div class="btn-group" id="btnGroup">
          <button class="btn btn-yes" id="yesBtn" onclick="onYes()">
            <span class="btn-text">Date Me</span>
            <span class="btn-shine"></span>
          </button>
          <button class="btn btn-no" id="noBtn" onclick="onNo()">
            <span class="btn-text">No</span>
          </button>
        </div>

      </div>
    </div>

    <footer class="footer">
      <p class="footer-text">Made by <span>Darwish</span></p>
    </footer>

  </main>

  <!-- YES overlay -->
  <div class="overlay" id="yesOverlay">
    <div class="overlay-card">
      <div class="overlay-label">finally</div>
      <img
        class="overlay-gif circular-gif-yes"
        src="assets/cat-flower.gif"
        alt="cat flowers"
      />
      <h2 class="overlay-title">She said yes!</h2>
      <p class="overlay-msg">
        You made the right call<br />
        This is going to be beautiful
      </p>
      <button class="btn btn-back" id="backBtn" onclick="closeYesOverlay()">
        <span class="btn-text">Back</span>
      </button>
    </div>
  </div>

  <!-- NO overlay (Cat with gun) -->
  <div class="overlay overlay-dark" id="noOverlay">
    <div class="overlay-card dark-card">
      <div class="overlay-label threat-label">final warning</div>
      <img
        class="overlay-gif circular-gif"
        src="assets/cat-gun.gif"
        alt="cat with gun"
      />
      <h2 class="overlay-title dark-title">Choose Wisely</h2>
      <p class="overlay-msg dark-msg">
        The cat has seen enough<br />
        Don't make another mistake
      </p>
      <button class="btn btn-ok" onclick="closeNoOverlay()">
        <span class="btn-text">Okay, I understand...</span>
      </button>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
